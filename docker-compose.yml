services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/opsledger.db
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - api_db:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  api_db:
